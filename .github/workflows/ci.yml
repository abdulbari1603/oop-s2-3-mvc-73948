name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore VcgCollege.sln

      - name: Build (Release)
        run: dotnet build VcgCollege.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test VcgCollege.sln --configuration Release --no-build --verbosity normal
